<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chorus — test surface</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 44rem; color: #111; }
    #boot-status {
      font-family: ui-monospace, monospace;
      font-size: 0.8125rem;
      color: #666;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 1rem;
      background: #fafafa;
    }
    #boot-status.error { color: #a00; background: #fff0f0; border-color: #f0c0c0; }
    h1 { margin-top: 0.5em; }
    h2 { margin-top: 1.5em; font-size: 1.1rem; color: #333; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
    input { font: inherit; padding: 0.25rem 0.5rem; }
    button { font: inherit; padding: 0.35rem 0.85rem; cursor: pointer; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <div id="boot-status">Booting…</div>
  <div id="root"></div>

  <!-- Single inline loader. Cache-busts bootstrap + chorus on every reload, so
       AI commits are reflected immediately in branch previews. Chorus loads
       via RELATIVE path so the branch's version of the tool is what runs. -->
  <script>
    (function () {
      var cb = new URL(location.href).searchParams.get('t') || Date.now().toString(36);

      var bs = document.createElement('script');
      bs.type = 'module';
      bs.src = './bootstrap.js?_cb=' + cb;
      document.body.appendChild(bs);

      var ch = document.createElement('script');
      ch.type = 'module';
      ch.id = 'chorus';
      ch.src = '../packages/chorus/app.js?_cb=' + cb;
      ch.setAttribute('data-github-client-id', 'Ov23lijbc9rZ5Vi9o9F2');
      ch.setAttribute('data-github-repo', 'MarcusRobbins/chorus');
      ch.setAttribute('data-github-auth-proxy', 'https://chorus-auth-proxy.marcusrobbins58.workers.dev');
      // Leaving data-openai-model unset lets chorus use its own default
      // (currently gpt-5.4). Users can override in Settings → Model.
      ch.setAttribute('data-preview-mode', 'full');
      ch.setAttribute('data-auto-preview', 'true');
      ch.setAttribute('data-debug', 'true');
      document.body.appendChild(ch);
    })();
  </script>
</body>
</html>
