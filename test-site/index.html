<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chorus — test surface</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 44rem; color: #111; }
    #boot-status {
      font-family: ui-monospace, monospace;
      font-size: 0.8125rem;
      color: #666;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 1rem;
      background: #fafafa;
    }
    #boot-status.error { color: #a00; background: #fff0f0; border-color: #f0c0c0; }
    h1 { margin-top: 0.5em; }
    h2 { margin-top: 1.5em; font-size: 1.1rem; color: #333; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
    input { font: inherit; padding: 0.25rem 0.5rem; }
    button { font: inherit; padding: 0.35rem 0.85rem; cursor: pointer; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <div id="boot-status">Booting…</div>
  <div id="root"></div>

  <!-- Inline loader with SHA-pinned chorus.
       Bootstrap loads relatively (it's the test-site's own compiler). Chorus
       is fetched via jsDelivr pinned to the latest `main` commit SHA — that
       URL form is immutable-cached, so chorus pushes go live immediately
       instead of waiting for GitHub Pages' Fastly cache to roll. Falls back
       to the relative github.io path if the GitHub API is rate-limited.
       When this page is viewed INSIDE a preview iframe (chorus-on-chorus),
       the relative fallback is actually what we want — it loads chorus from
       the branch's own tree at rawcdn.githack, which is immutable too. -->
  <script>
    (function () {
      var cb = new URL(location.href).searchParams.get('t') || Date.now().toString(36);

      var bs = document.createElement('script');
      bs.type = 'module';
      bs.src = './bootstrap.js?_cb=' + cb;
      document.body.appendChild(bs);

      function loadChorus(src) {
        var ch = document.createElement('script');
        ch.type = 'module';
        ch.id = 'chorus';
        ch.src = src;
        ch.setAttribute('data-github-client-id', 'Ov23lijbc9rZ5Vi9o9F2');
        ch.setAttribute('data-github-repo', 'MarcusRobbins/chorus');
        ch.setAttribute('data-github-auth-proxy', 'https://chorus-auth-proxy.marcusrobbins58.workers.dev');
        ch.setAttribute('data-preview-mode', 'full');
        ch.setAttribute('data-auto-preview', 'true');
        ch.setAttribute('data-chorus-meta', 'true');
        ch.setAttribute('data-debug', 'true');
        document.body.appendChild(ch);
      }

      var inIframe = window !== window.top;
      if (inIframe) {
        // Inside the preview iframe: load via relative path so chorus comes
        // from the iframe's branch (rawcdn.githack, SHA-pinned, immutable).
        loadChorus('../packages/chorus/app.js?_cb=' + cb);
        return;
      }

      // Top-level: resolve latest chorus main SHA, load from jsDelivr@SHA
      // (immutable). Fall back to the relative github.io path if the API
      // call fails (rate limit etc.).
      fetch('https://api.github.com/repos/MarcusRobbins/chorus/commits/main', {
        headers: { 'Accept': 'application/vnd.github+json' },
      })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (d) {
          var sha = d && d.sha;
          if (!sha) throw new Error('no sha');
          loadChorus('https://cdn.jsdelivr.net/gh/MarcusRobbins/chorus@' + sha + '/packages/chorus/app.js');
        })
        .catch(function () {
          loadChorus('../packages/chorus/app.js?_cb=' + cb);
        });
    })();
  </script>
</body>
</html>
